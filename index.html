<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LexFamilia</title>
    <link rel="stylesheet" href="styles.css?v=6.7">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="splash"
        style="position:fixed; inset:0; background:#1A3A5C; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; color:white;">
        <h1 style="font-family:'Playfair Display',serif; margin:0; font-size:32px;">LexFamilia</h1>
        <p style="opacity:0.8; font-family:'Inter',sans-serif; margin-top:8px;">Cargando v6.8...</p>
    </div>

    <div id="app-view" class="container"></div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-route="inicio" onclick="window.navigateTo('inicio')">
            <div class="icon">🏠</div>
            <div class="label">Inicio</div>
        </div>
        <div class="nav-item" data-route="estudio" onclick="window.navigateTo('estudio')">
            <div class="icon">📚</div>
            <div class="label">Estudio</div>
        </div>
        <div class="nav-item" data-route="test" onclick="window.navigateTo('test')">
            <div class="icon">❓</div>
            <div class="label">Test</div>
        </div>
        <div class="nav-item" data-route="flashcards" onclick="window.navigateTo('flashcards')">
            <div class="icon">🔄</div>
            <div class="label">Tarjetas</div>
        </div>
        <div class="nav-item" data-route="perfil" onclick="window.navigateTo('perfil')">
            <div class="icon">👤</div>
            <div class="label">Perfil</div>
        </div>
    </nav>

    <script src="config.js?v=6.8"></script>
    <script src="data_borja.js?v=6.8"></script>
    <script src="teoria_boe.js?v=6.8"></script>
    <script src="data.js?v=6.8"></script>
    <script src="claude_generator.js?v=6.8"></script>
    <script src="app.js?v=6.8"></script>

    <script>
        // Limpiador INFALIBLE de Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for (let reg of regs) reg.unregister();
            });
        }
        window.addEventListener('load', () => {
            setTimeout(() => {
                const s = document.getElementById('splash');
                if (s) s.style.display = 'none';
            }, 500);
        });
    </script>
</body>

</html>
